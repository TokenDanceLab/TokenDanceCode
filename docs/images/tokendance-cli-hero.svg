<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">TokenDanceCode CLI hero</title>
  <desc id="desc">A transparent-background terminal-style TokenDanceCode CLI hero using AgentHub design colors and a stable TOKENDANCE wordmark.</desc>

  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020814" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- AgentHub design dark tokens:
       app-bg #1a1a20, surface #24242d, surface-dim #1e1e26,
       text-1 #e3e4e6, text-2 #9a9aa4, primary dark #29ABE2. -->
  <rect x="56" y="48" width="1088" height="560" rx="10" fill="#1a1a20" stroke="#2a3850" stroke-width="1" filter="url(#softShadow)"/>

  <!-- Terminal chrome -->
  <rect x="56" y="48" width="1088" height="54" rx="10" fill="#24242d"/>
  <rect x="56" y="88" width="1088" height="1" fill="#2f405a"/>
  <circle cx="88" cy="75" r="7" fill="#ff5f56"/>
  <circle cx="113" cy="75" r="7" fill="#ffbd2e"/>
  <circle cx="138" cy="75" r="7" fill="#27c93f"/>
  <text x="600" y="80" fill="#9a9aa4" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="15" text-anchor="middle">tokendance</text>

  <!-- Prompt line -->
  <text x="88" y="143" font-family="Cascadia Mono, SFMono-Regular, Consolas, monospace" font-size="24" font-weight="700">
    <tspan fill="#e3e4e6">PS</tspan>
    <tspan fill="#9a9aa4"> &lt;workspace&gt;</tspan>
    <tspan fill="#e3e4e6">&gt;</tspan>
    <tspan fill="#29ABE2"> tokendance</tspan>
  </text>
  <rect x="88" y="174" width="1024" height="2" rx="1" fill="#2f405a"/>

  <!-- Stable wordmark: one SVG text run, no box-drawing characters. -->
  <text x="600" y="278" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="800" text-anchor="middle">
    <tspan fill="#e3e4e6">TOKEN</tspan><tspan fill="#29ABE2">DANCE</tspan>
  </text>
  <rect x="120" y="304" width="960" height="3" rx="1.5" fill="#29ABE2" opacity="0.55"/>

  <!-- Product metadata -->
  <text x="88" y="360" fill="#e3e4e6" font-family="Cascadia Mono, SFMono-Regular, Consolas, monospace" font-size="24" font-weight="700">
    TokenDanceCode 0.2.0-ts.0
    <tspan fill="#9a9aa4"> Provider:</tspan>
    <tspan fill="#29ABE2"> TokenDance Gateway</tspan>
    <tspan fill="#9a9aa4"> CWD:</tspan>
    <tspan fill="#e3e4e6"> &lt;workspace&gt;</tspan>
  </text>
  <rect x="88" y="394" width="1024" height="2" rx="1" fill="#2f405a"/>

  <!-- Feature copy -->
  <g font-family="Cascadia Mono, SFMono-Regular, Consolas, monospace" font-size="23" font-weight="650">
    <text x="88" y="448" fill="#e3e4e6">&gt; local coding-agent runtime for repositories</text>
    <text x="88" y="500" fill="#e3e4e6">&gt; guarded PowerShell tools, JSONL transcripts, SDK events</text>
    <text x="88" y="552" fill="#e3e4e6">&gt; OpenAI, Anthropic-compatible, and TokenDance Gateway providers</text>
  </g>

  <!-- Command/status colors -->
  <text x="88" y="578" fill="#7dd3fc" font-family="Cascadia Mono, SFMono-Regular, Consolas, monospace" font-size="20" font-weight="700">tokendance run "summarize this repo" --json</text>
  <text x="694" y="578" fill="#9ccf8f" font-family="Cascadia Mono, SFMono-Regular, Consolas, monospace" font-size="20" font-weight="700">[done] AgentHub stream ready</text>
</svg>
