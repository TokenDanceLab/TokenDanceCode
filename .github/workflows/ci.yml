name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - codex/ts-refactor
      - release/npm-first

permissions:
  contents: read

jobs:
  npm-first-ts:
    name: npm-first TS baseline
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release contract
        run: pnpm contract:check

      - name: Verify TypeScript baseline
        run: pnpm verify

      - name: Smoke test packed tarballs
        run: pnpm pack:smoke

      - name: Check npm next registry state
        run: pnpm registry:next:check
